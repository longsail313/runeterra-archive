<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>装备资料库 · 符文之地资料馆</title>
  <meta name="description" content="基于 Riot Data Dragon 的英雄联盟装备资料库，包含价格、基础数值、效果与合成路线。">
  <link rel="preconnect" href="https://ddragon.leagueoflegends.com">
  <link rel="preconnect" href="https://d28xe8vt774jo5.cloudfront.net">
  <link rel="preconnect" href="https://yz.lol.qq.com">
  <link rel="preconnect" href="https://lol.qq.com">
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem("runeterra-theme");
        document.documentElement.dataset.theme = storedTheme === "light" ? "light" : "dark";
      } catch (error) {
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="items">
  <a class="skip-link" href="#items">跳到主要内容</a>

  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="index.html" aria-label="返回符文之地资料馆首页">
        <div class="brand-mark" aria-hidden="true">L</div>
        <div class="brand-title">
          <strong>符文之地资料馆</strong>
          <span>英雄、技能、传记、阵营与世界观</span>
        </div>
      </a>
      <nav class="nav" aria-label="页面导航">
        <a href="champions.html">英雄</a>
        <a href="systems.html">系统</a>
        <a href="items.html" class="is-current">装备</a>
        <a href="regions.html">阵营</a>
        <a href="world.html">世界观</a>
        <a href="sources.html">来源</a>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换为浅色主题" title="切换主题">
          <span class="theme-switch-icon" aria-hidden="true"></span>
          <span id="themeLabel">浅色</span>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <section class="band" id="items">
      <div class="shell">
        <div class="section-heading">
          <div>
            <h2>装备资料库</h2>
            <p>装备列表、图标、价格、基础数值、效果文本和合成路线来自 Riot Data Dragon 当前版本。鼠标悬停或键盘聚焦装备图标，即可查看完整详情。</p>
          </div>
          <div class="source-row">
            <a class="source-link" href="https://ddragon.leagueoflegends.com/api/versions.json" target="_blank" rel="noreferrer">Data Dragon</a>
            <a class="source-link" href="systems.html">游戏系统</a>
          </div>
        </div>

        <div class="notice" id="itemsNotice">
          正在读取 Riot Data Dragon 当前版本装备数据。
        </div>

        <div class="item-tools" role="search">
          <div class="field">
            <label for="itemSearchInput">搜索装备、属性、效果、组件</label>
            <input id="itemSearchInput" type="search" placeholder="例如：实境器、法术强度、护甲、鞋子、暴击">
          </div>
          <div class="field">
            <label for="itemCategorySelect">装备分类</label>
            <select id="itemCategorySelect">
              <option value="">全部装备</option>
              <option value="attack">攻击</option>
              <option value="magic">法术</option>
              <option value="defense">防御</option>
              <option value="movement">移动</option>
              <option value="jungle">打野</option>
              <option value="support">辅助</option>
              <option value="vision">视野</option>
              <option value="consumable">消耗品</option>
            </select>
          </div>
        </div>

        <p class="item-summary" id="itemSummary">等待装备数据加载。</p>
        <div class="item-grid" id="itemGrid"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="shell">
      本页面是本地资料整理页，League of Legends、Riot Games、英雄名称、图像和相关素材属于 Riot Games。页面通过官方公开数据与官方站点资源加载资料，不包含非官方百科文本。
    </div>
  </footer>

  <script src="assets/app.js" defer></script>
</body>
</html>
